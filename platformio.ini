; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = nano33ble_SenseRev2

[nano33ble]
platform = nordicnrf52 @ 10.11.0
board = nano33ble
framework = arduino
build_flags = 
lib_deps = 

[env:nano33ble_SenseRev2]
extends = nano33ble
build_flags =   ${nano33ble.build_flags}
                -DNANO33BLE_SENSE_REV2
lib_deps =  ${nano33ble.lib_deps}
            https://github.com/arduino-libraries/Arduino_HS300x.git#1.0.0

[env:nano33ble_Sense]
extends = nano33ble
build_flags =   ${nano33ble.build_flags}
                -DNANO33BLE_SENSE
lib_deps =  ${nano33ble.lib_deps}
            https://github.com/arduino-libraries/Arduino_HTS221.git#1.0.0
